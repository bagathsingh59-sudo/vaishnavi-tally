version: "3.9"

services:
  app:
    build: .
    container_name: vaishnavi_tally
    ports:
      - "8000:8000"
    environment:
      - ENV=production
      - DB_NAME=vaishnavi_tally
      - MONGO_URI_PROD=${MONGO_URI_PROD}
      - FIRM_NAME=Vaishnavi Consultants
      - SECRET_KEY=${SECRET_KEY:-change-me-in-production}
    restart: unless-stopped
